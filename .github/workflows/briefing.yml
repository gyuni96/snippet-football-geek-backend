name: Liverpool Briefing

on:
  workflow_dispatch:
    inputs:
      team:
        description: Team slug
        required: true
        default: liverpool
      briefing_type:
        description: Briefing type
        required: true
        default: morning
        type: choice
        options:
          - morning
          - afternoon
          - evening
          - transfer_extra
          - matchday
      source:
        description: Configured source key
        required: true
        default: liverpool_echo
      limit:
        description: Max briefing items to process
        required: true
        default: "3"
      use_groq:
        description: Generate Korean summaries with Groq
        required: true
        default: true
        type: boolean
  schedule:
    # 05:00 KST early briefing
    - cron: "0 20 * * *"
    # 16:00 KST afternoon briefing
    - cron: "0 7 * * *"
    # 22:00 KST night briefing
    - cron: "0 13 * * *"

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Build briefing payload
        run: |
          TEAM="${{ github.event.inputs.team || 'liverpool' }}"
          BRIEFING_TYPE="${{ github.event.inputs.briefing_type }}"
          SOURCE="${{ github.event.inputs.source || 'liverpool_echo' }}"
          LIMIT="${{ github.event.inputs.limit || '3' }}"
          USE_GROQ="${{ github.event.inputs.use_groq || 'true' }}"

          if [ -z "$BRIEFING_TYPE" ]; then
            case "$(date -u +%H)" in
              20)
                BRIEFING_TYPE="morning"
                ;;
              07)
                BRIEFING_TYPE="afternoon"
                ;;
              13)
                BRIEFING_TYPE="evening"
                ;;
              *)
                BRIEFING_TYPE="morning"
                ;;
            esac
          fi

          CMD=(
            python3 -m app.jobs.run_briefing
            --team "$TEAM"
            --type "$BRIEFING_TYPE"
            --source "$SOURCE"
            --limit "$LIMIT"
          )

          if [ "$USE_GROQ" = "true" ]; then
            CMD+=(--use-groq)
          fi

          "${CMD[@]}"
