name: Liverpool Briefing

on:
  workflow_dispatch:
    inputs:
      team:
        description: 팀 slug
        required: true
        default: liverpool
      briefing_type:
        description: 브리핑 타입
        required: true
        default: morning
        type: choice
        options:
          - morning
          - afternoon
          - evening
          - transfer_extra
          - matchday
      source:
        description: 설정된 수집 소스 key
        required: true
        default: all
      limit:
        description: 처리할 최대 브리핑 항목 수. 비워두면 새 소식을 모두 처리합니다.
        required: false
        default: ""
      use_groq:
        description: Groq로 한국어 요약 생성
        required: true
        default: true
        type: boolean
  schedule:
    # 한국 시간 05:00 새벽/아침 브리핑
    - cron: "0 20 * * *"
    # 한국 시간 16:00 오후 브리핑
    - cron: "0 7 * * *"
    # 한국 시간 22:00 밤 브리핑
    - cron: "0 13 * * *"

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install X collector dependencies
        run: python3 -m pip install ".[x-twikit]"

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Build briefing payload
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_REQUESTS_PER_MINUTE: "10"
          GROQ_MAX_REQUESTS: "60"
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_AUTH_TOKEN: ${{ secrets.X_AUTH_TOKEN }}
          X_CT0: ${{ secrets.X_CT0 }}
          X_COOKIES_FILE: ${{ secrets.X_COOKIES_FILE }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TEAM="${{ github.event.inputs.team || 'liverpool' }}"
          BRIEFING_TYPE="${{ github.event.inputs.briefing_type }}"
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          LIMIT="${{ github.event.inputs.limit || '' }}"
          USE_GROQ="${{ github.event.inputs.use_groq || 'true' }}"

          if [ -z "$BRIEFING_TYPE" ]; then
            case "$(date -u +%H)" in
              20)
                BRIEFING_TYPE="morning"
                ;;
              07)
                BRIEFING_TYPE="afternoon"
                ;;
              13)
                BRIEFING_TYPE="evening"
                ;;
              *)
                BRIEFING_TYPE="morning"
                ;;
            esac
          fi

          CMD=(
            python3 -m app.jobs.run_briefing
            --team "$TEAM"
            --type "$BRIEFING_TYPE"
            --source "$SOURCE"
            --x-provider twikit
            --save-supabase
            --save-monitoring
            --notify-discord
          )

          if [ -n "$LIMIT" ]; then
            CMD+=(--limit "$LIMIT")
          fi

          if [ "$USE_GROQ" = "true" ]; then
            CMD+=(--use-groq)
          fi

          "${CMD[@]}"
