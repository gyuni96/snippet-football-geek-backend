name: Liverpool Briefing

on:
  workflow_dispatch:
    inputs:
      team:
        description: Team slug
        required: true
        default: liverpool
      briefing_type:
        description: Briefing type
        required: true
        default: morning
        type: choice
        options:
          - morning
          - evening
          - transfer_extra
          - matchday
      source:
        description: Configured source key
        required: true
        default: liverpool_echo
      limit:
        description: Max briefing items to process
        required: true
        default: "3"
      use_groq:
        description: Generate Korean summaries with Groq
        required: true
        default: true
        type: boolean
  schedule:
    # 07:30 KST morning briefing
    - cron: "30 22 * * *"
    # 18:30 KST evening briefing
    - cron: "30 9 * * *"

jobs:
  run-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python3 -m unittest discover -s tests -v

      - name: Build briefing payload
        run: |
          TEAM="${{ github.event.inputs.team || 'liverpool' }}"
          BRIEFING_TYPE="${{ github.event.inputs.briefing_type || 'morning' }}"
          SOURCE="${{ github.event.inputs.source || 'liverpool_echo' }}"
          LIMIT="${{ github.event.inputs.limit || '3' }}"
          USE_GROQ="${{ github.event.inputs.use_groq || 'true' }}"

          CMD=(
            python3 -m app.jobs.run_briefing
            --team "$TEAM"
            --type "$BRIEFING_TYPE"
            --source "$SOURCE"
            --limit "$LIMIT"
          )

          if [ "$USE_GROQ" = "true" ]; then
            CMD+=(--use-groq)
          fi

          "${CMD[@]}"
